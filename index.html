<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lecture PDF</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Arial, "Malgun Gothic", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f7f7f2;
      color: #202124;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid #d8d8d2;
      background: #ffffff;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }

    a {
      color: #155eef;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }

    a:hover {
      text-decoration: underline;
    }

    main {
      height: calc(100vh - 57px);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    @media (max-width: 560px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      main {
        height: calc(100vh - 92px);
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Lecture PDF</h1>
    <a href="lecture.pdf">PDF 새 창으로 열기</a>
  </header>
  <main>
    <iframe src="lecture.pdf" title="Lecture PDF"></iframe>
  </main>
</body>
</html>
